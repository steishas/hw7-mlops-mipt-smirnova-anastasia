---

services:
  ml-service-v1:
    build: .
    container_name: ml-v1
    environment:
      - MODEL_VERSION=v1.0.0
    ports:
      - "5001:5000"
    networks:
      - ml-network

  ml-service-v2:
    build:
      context: .
      dockerfile: Dockerfile.bugged
    container_name: ml-v2
    environment:
      - MODEL_VERSION=v1.2.0
    ports:
      - "5002:5000"
    networks:
      - ml-network

  nginx:
    image: nginx:alpine
    container_name: ml-balancer
    ports:
      - "80:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    depends_on:
      - ml-service-v1
      - ml-service-v2
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge
